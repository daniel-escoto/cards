<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <meta id="themeColor" name="theme-color" content="#090d10" />
    <title>Texas Hold'em</title>
    <script>
      const initialTheme = matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
      document.documentElement.dataset.theme = initialTheme;
      document.querySelector("#themeColor").content = initialTheme === "light" ? "#eef1ec" : "#090d10";
    </script>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app">
      <section id="welcome" class="welcome">
        <div class="brand">
          <span class="mark" aria-hidden="true">♠</span>
          <div>
            <h1>Texas Hold’em</h1>
          </div>
        </div>

        <form id="joinForm" class="join-panel">
          <div class="mode-switch" role="tablist" aria-label="Table action">
            <button id="hostModeBtn" class="mode-option selected" type="button" role="tab" aria-selected="true">Host a table</button>
            <button id="joinModeBtn" class="mode-option" type="button" role="tab" aria-selected="false">Join a table</button>
          </div>
          <label class="form-field name-field">
            <span>Display name</span>
            <input id="nameInput" autocomplete="nickname" maxlength="18" placeholder="Your name" required />
          </label>
          <label id="roomCodeLabel" class="form-field hidden">
            <span>Room code</span>
            <input id="roomInput" maxlength="6" placeholder="ABC123" autocapitalize="characters" spellcheck="false" />
          </label>
          <div id="blindFields" class="blind-fields">
            <label class="form-field">
              <span id="smallBlindLabel">Small blind</span>
              <input id="smallBlindInput" type="number" min="1" max="100000" step="1" value="10" inputmode="decimal" />
            </label>
            <label class="form-field">
              <span id="bigBlindLabel">Big blind</span>
              <input id="bigBlindInput" type="number" min="2" max="100000" step="1" value="20" inputmode="decimal" />
            </label>
          </div>
          <label class="checkbox-label">
            <input id="moneyModeInput" type="checkbox" />
            <span class="switch-control" aria-hidden="true"></span>
            <span class="checkbox-copy">
              <strong>Money mode</strong>
              <small>Track buy-ins in dollars, without CPU players</small>
            </span>
          </label>
          <label id="buyInLabel" class="form-field hidden">
            <span>Buy-in</span>
            <input id="buyInInput" type="number" min="10" max="10000" step="10" value="20" inputmode="decimal" />
          </label>
          <div class="actions-row">
            <button id="tableActionBtn" type="submit">Host table</button>
          </div>
          <p id="joinError" class="error" role="alert"></p>
        </form>
      </section>

      <section id="tableView" class="table-view hidden">
        <header class="topbar">
          <div class="room-summary">
            <button id="roomCodeBtn" class="room-code-btn" type="button" aria-label="Copy room code">
              <span class="eyebrow">Room</span>
              <strong id="roomCode"></strong>
              <span class="copy-icon" aria-hidden="true">⧉</span>
            </button>
            <span id="phaseBadge" class="phase-badge">Lobby</span>
          </div>
          <div class="topbar-actions">
            <button id="menuBtn" class="ghost menu-btn" type="button" aria-haspopup="dialog" aria-controls="gameMenuModal">Menu</button>
          </div>
        </header>

        <section class="felt">
          <div id="community" class="community"></div>
          <section class="control-panel">
            <div class="hand-row">
              <button id="heroHand" class="hero-hand" type="button" aria-label="Hide your cards" aria-pressed="false"></button>
              <div class="table-meta">
                <div>
                  <span>Pot</span>
                  <strong id="potValue">0</strong>
                </div>
              </div>
            </div>
            <div id="winnerList" class="winner-list"></div>
            <div id="turnInfo" class="turn-info"></div>
            <div id="gameButtons" class="game-buttons"></div>
            <div id="betControls" class="bet-controls hidden">
              <div class="raise-stepper" aria-label="Raise amount">
                <button id="raiseMinus" type="button" class="secondary" aria-label="Decrease raise">-</button>
                <div class="raise-display">
                  <span id="raiseLabel">Raise to</span>
                  <strong id="raiseAmount">40</strong>
                </div>
                <button id="raisePlus" type="button" class="secondary" aria-label="Increase raise">+</button>
              </div>
            </div>
          </section>
          <div id="players" class="players"></div>
        </section>
      </section>

      <section id="scoreView" class="score-view hidden">
        <div class="score-panel">
          <div class="score-head">
            <p class="eyebrow">Final standings</p>
            <h2>Game over</h2>
          </div>
          <div id="scoreList" class="score-list"></div>
          <button id="scoreMenuBtn" type="button">Back to menu</button>
        </div>
      </section>

      <div id="gameMenuModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="gameMenuTitle">
        <div class="modal-panel">
          <div class="modal-head">
            <div>
              <p class="eyebrow">Room <span id="menuRoomCode"></span></p>
              <h2 id="gameMenuTitle">Table menu</h2>
            </div>
            <button id="closeMenuBtn" class="ghost icon-btn" type="button" aria-label="Close menu">×</button>
          </div>
          <div id="menuPlayers" class="menu-players"></div>
          <button id="addBotBtn" class="secondary add-bot-btn hidden" type="button">+ Add bot player</button>
          <details class="appearance-panel">
            <summary>Table appearance</summary>
            <div class="appearance-group">
              <span>Felt color</span>
              <div id="feltChoices" class="appearance-choices color-choices" aria-label="Felt color"></div>
            </div>
            <div class="appearance-group">
              <span>Deck</span>
              <div id="deckChoices" class="appearance-choices" aria-label="Deck style"></div>
            </div>
          </details>
          <details id="blindPanel" class="appearance-panel blind-settings-panel hidden">
            <summary>Blind settings</summary>
            <form id="blindForm" class="blind-settings-form">
              <div class="blind-fields">
                <label>
                  <span id="menuSmallBlindLabel">Small blind</span>
                  <input id="menuSmallBlindInput" type="number" min="1" step="1" inputmode="decimal" />
                </label>
                <label>
                  <span id="menuBigBlindLabel">Big blind</span>
                  <input id="menuBigBlindInput" type="number" min="2" step="1" inputmode="decimal" />
                </label>
              </div>
              <button type="submit">Update blinds</button>
            </form>
          </details>
          <div id="sharePanel" class="share-panel hidden">
            <img id="shareQr" alt="Room invite QR code" />
            <div class="share-link-row">
              <input id="shareLink" readonly aria-label="Room invite link" />
              <button id="copyShareBtn" type="button" class="secondary">Copy</button>
            </div>
          </div>
          <form id="moneyPanel" class="money-panel hidden">
            <label>
              Cash in amount
              <input id="cashInInput" type="number" min="1" max="10000" step="1" value="20" inputmode="decimal" />
            </label>
            <div class="money-actions">
              <button id="cashInBtn" type="submit">Cash in</button>
              <button id="cashOutBtn" type="button" class="secondary">Cash out</button>
            </div>
          </form>
          <div class="modal-actions">
            <button id="restartGameBtn" type="button">Restart game</button>
            <button id="endGameBtn" type="button" class="danger">End game</button>
            <button id="shareGameBtn" type="button" class="secondary">Share</button>
            <button id="backToMenuBtn" type="button" class="secondary">Leave game</button>
          </div>
        </div>
      </div>
      <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
